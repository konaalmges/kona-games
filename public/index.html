<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kona Games</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- شاشة تدوير الهاتف -->
<div id="rotate-screen">
  <div class="r-icon">📱</div>
  <h2>أدر هاتفك</h2>
  <p>للحصول على أفضل تجربة<br>يرجى تدوير جهازك إلى الوضع الأفقي</p>
</div>

<header class="header">
  <div class="logo">
    <div class="logo-box">🎮</div>
    KONA <em>GAMES</em>
  </div>
  <div class="header-right">
    <a href="/admin"><button class="btn btn-ghost" style="font-size:13px">⚙️ أدمن</button></a>
  </div>
</header>

<div class="setup-layout">

  <!-- يسار: الفئات -->
  <div class="cats-panel">
    <div class="panel-top">
      <div>
        <h2>اختر الفئات</h2>
        <p class="hint">⚠️ اختر ٦ فئات بالضبط لتبدأ اللعبة</p>
      </div>
      <div class="count-pill" id="count-pill">0 / 6</div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-bar" id="search" placeholder="ابحث عن فئة..." oninput="renderCats()">
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all',this)">الكل</button>
      <button class="filter-tab" onclick="setFilter('sports',this)">⚽ رياضة</button>
      <button class="filter-tab" onclick="setFilter('knowledge',this)">🌍 معرفة</button>
      <button class="filter-tab" onclick="setFilter('fun',this)">🎭 ترفيه</button>
      <button class="filter-tab" onclick="setFilter('religion',this)">🕌 دين</button>
      <button class="filter-tab" onclick="setFilter('food',this)">🍕 طعام</button>
    </div>

    <div class="sect-label" id="sect-label">جميع الفئات</div>
    <div class="cats-grid" id="cats-grid"></div>
  </div>

  <!-- يمين: الإعداد -->
  <div class="config-panel">
    <div class="cfg-title">الفئات المختارة</div>
    <div class="preview-grid" id="preview-grid"></div>

    <div>
      <div class="cfg-label">🏷️ اسم اللعبة</div>
      <input type="text" class="cfg-input" id="game-name" placeholder="Kona Night 🎉" maxlength="30">
    </div>

    <div>
      <div class="cfg-label">🔵 الفريق الأول</div>
      <input type="text" class="cfg-input" id="t1-name" placeholder="Team 1" maxlength="20">
    </div>

    <div>
      <div class="cfg-label">🔴 الفريق الثاني</div>
      <input type="text" class="cfg-input" id="t2-name" placeholder="Team 2" maxlength="20">
    </div>

    <div style="flex:1"></div>

    <button class="btn btn-yellow" id="start-btn" disabled onclick="startGame()" style="width:100%;justify-content:center;font-size:17px;padding:16px;">
      ابدأ اللعبة 🎮
    </button>
  </div>
</div>

<div id="toast"></div>
<script src="/js/setup.js"></script>
</body>
</html>
