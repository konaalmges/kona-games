<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kona Games – اللوحة</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-k">🎮</div>
    <span id="hdr-title">KONA <em>GAMES</em></span>
  </div>
  <div class="header-actions">
    <span id="hdr-progress" style="color:rgba(255,255,255,0.5);font-size:13px;font-weight:700;"></span>
    <button class="btn btn-ghost" style="font-size:13px" onclick="confirmExit()">↩ خروج</button>
  </div>
</header>

<div class="game-layout">
  <div class="board-area" id="board-area">
    <div class="board-bg" id="board-bg"></div>
    <div class="board-grid" id="board"></div>
  </div>

  <div class="side-panel">

    <div class="team-card" id="tc-0">
      <div class="team-turn-badge">⚡ دورك الآن</div>
      <div class="team-name" id="tname-0">Team 1</div>
      <div class="team-score" id="tscore-0">0</div>
      <div class="score-row">
        <button class="sc-btn" onclick="adj(0,200)">＋</button>
        <button class="sc-btn" onclick="adj(0,-200)">－</button>
      </div>
      <!-- المميزات تُستخدم فقط في صفحة السؤال -->
      <div class="board-powers" id="bpow-0"></div>
    </div>

    <button class="divider-btn" onclick="switchTurn()">⇄ تبديل الدور</button>

    <div class="team-card" id="tc-1">
      <div class="team-turn-badge">⚡ دورك الآن</div>
      <div class="team-name" id="tname-1">Team 2</div>
      <div class="team-score" id="tscore-1">0</div>
      <div class="score-row">
        <button class="sc-btn" onclick="adj(1,200)">＋</button>
        <button class="sc-btn" onclick="adj(1,-200)">－</button>
      </div>
      <div class="board-powers" id="bpow-1"></div>
    </div>

    <div style="margin-top:auto">
      <div class="board-progress-wrap">
        <div class="board-progress-fill" id="prog-fill"></div>
      </div>
      <div class="board-progress-label" id="prog-label">0 / 36 سؤال</div>
    </div>

  </div>
</div>

<div id="toast"></div>
<script src="/js/cats-images.js"></script>
<script src="/js/game.js"></script>
</body>
</html>
