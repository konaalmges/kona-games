<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kona Games – السؤال</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="q-page">

  <!-- Main -->
  <div class="q-main">

    <!-- Hero Banner -->
    <div class="q-hero" id="q-hero">
      <div class="q-hero-img" id="q-hero-img"></div>
      <div class="q-hero-overlay"></div>
      <div class="q-hero-content">
        <div class="q-hero-emoji" id="q-hero-emoji">🎮</div>
        <div class="q-hero-info">
          <div class="q-hero-label">الفئة</div>
          <div class="q-hero-name" id="q-hero-name">—</div>
        </div>
        <div class="q-pts-badge" id="q-pts">200 نقطة</div>
        <div class="diff-badge diff-easy" id="q-diff-badge">سهل</div>
      </div>
    </div>

    <!-- Timer -->
    <div class="q-timer-wrap">
      <div class="t-btns">
        <button class="t-btn" id="pause-btn" onclick="toggleTimer()">⏸</button>
        <button class="t-btn" onclick="resetTimer()">↺</button>
      </div>
      <div class="t-display" id="t-display">01:00</div>
      <div class="t-track"><div class="t-fill" id="t-fill"></div></div>
    </div>

    <!-- Question Card -->
    <div class="q-card">
      <div class="q-text" id="q-text">⏳</div>
      <div class="q-choices" id="q-choices"></div>
      <div class="q-answer" id="q-answer"></div>
    </div>

    <!-- Power Effect Flash -->
    <div class="power-flash" id="power-flash" style="display:none"></div>

    <!-- Bottom bar -->
    <div class="q-bottombar">
      <button class="back-btn" onclick="goBack()">← الرجوع</button>
      <button class="reveal-btn" id="reveal-btn" onclick="revealAnswer()">اظهر الجواب ◀</button>
      <div class="award-row" id="award-row">
        <button class="award-btn none" onclick="award(0)">❌ لا أحد</button>
        <button class="award-btn t2" onclick="award(2)">✅ أجاب <span id="t2-lbl"></span></button>
        <button class="award-btn t1" onclick="award(1)">✅ أجاب <span id="t1-lbl"></span></button>
      </div>
    </div>

  </div>

  <!-- Side Panel: Teams + Powers -->
  <div class="side-panel">

    <!-- Team 0 -->
    <div class="team-card" id="stc-0">
      <div class="team-turn-badge">⚡ دورك</div>
      <div class="team-name" id="sname-0"></div>
      <div class="team-score" id="sscore-0">0</div>
      <div class="q-powers-grid" id="qpow-0">
        <!-- generated by JS -->
      </div>
    </div>

    <button class="divider-btn" onclick="goBack()">↩ للوحة</button>

    <!-- Team 1 -->
    <div class="team-card" id="stc-1">
      <div class="team-turn-badge">⚡ دورك</div>
      <div class="team-name" id="sname-1"></div>
      <div class="team-score" id="sscore-1">0</div>
      <div class="q-powers-grid" id="qpow-1">
        <!-- generated by JS -->
      </div>
    </div>

  </div>

</div>

<div id="toast"></div>
<script src="/js/cats-images.js"></script>
<script src="/js/question.js"></script>
</body>
</html>
